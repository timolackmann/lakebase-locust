# Locust master Pod. Set LOCUST_IMAGE before applying (deploy_locust.sh uses envsubst).
#
# Before applying, create both ConfigMaps from your repo root (shared by master and worker):
#   kubectl create configmap locust-script --from-file=locust.py=./locust.py
#   kubectl create configmap locust-config --from-file=config.json=./config.json
#
# Then: export LOCUST_IMAGE=your-registry/locust-lakebase:tag && envsubst < k8s/locust-master-pod.yaml | kubectl apply -f -
---
apiVersion: v1
kind: Pod
metadata:
  name: locust-master
  labels:
    app: locust
    role: master
spec:
  containers:
    - name: locust
      image: ${LOCUST_IMAGE}
      imagePullPolicy: Always
      env:
        - name: LOCUST_OPTIONS
          value: "--master"
        - name: CONFIG_PATH
          value: "/mnt/locust-config/config.json"
      ports:
        - containerPort: 8089
      volumeMounts:
        - name: locust-script
          mountPath: /mnt/locust
        - name: locust-config
          mountPath: /mnt/locust-config
          readOnly: true
  volumes:
    - name: locust-script
      configMap:
        name: locust-script
    - name: locust-config
      configMap:
        name: locust-config
