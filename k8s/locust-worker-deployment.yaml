# Locust worker Deployment. Set LOCUST_IMAGE and WORKER_REPLICAS before applying (envsubst).
# Uses the same ConfigMaps as the master (locust-script, locust-config).
# Ensure the master Pod and Service (name: master) are running so workers can connect.
#
# Apply after creating ConfigMaps and the master:
#   export LOCUST_IMAGE=your-registry/locust-lakebase:tag WORKER_REPLICAS=3
#   envsubst < k8s/locust-worker-deployment.yaml | kubectl apply -f -
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  labels:
    app: locust
    role: worker
spec:
  replicas: ${WORKER_REPLICAS}
  selector:
    matchLabels:
      app: locust
      role: worker
  template:
    metadata:
      labels:
        app: locust
        role: worker
    spec:
      containers:
        - name: locust
          image: ${LOCUST_IMAGE}
          imagePullPolicy: Always
          env:
            - name: LOCUST_OPTIONS
              value: "--worker --master-host master"
            - name: CONFIG_PATH
              value: "/mnt/locust-config/config.json"
          ports:
            - containerPort: 8089
          volumeMounts:
            - name: locust-script
              mountPath: /mnt/locust
            - name: locust-config
              mountPath: /mnt/locust-config
              readOnly: true
      volumes:
        - name: locust-script
          configMap:
            name: locust-script
        - name: locust-config
          configMap:
            name: locust-config
